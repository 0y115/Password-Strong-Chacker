<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strong Checker</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="icon">🔒</div>
      <div>
        <h1>Password Strong Checker</h1>
        <p>Check and Improve Your Password Security</p>
      </div>
    </div>
    <div class="toggle">
      <button id="btn-light">☀ Light</button>
      <button id="btn-dark" class="active">☾ Dark</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div class="ring-wrap">
        <div class="ring">
          <svg width="100" height="100">
            <circle cx="50" cy="50" r="42" stroke="var(--border)" stroke-width="9" fill="none"/>
            <circle id="ring-fg" cx="50" cy="50" r="42" stroke="var(--red)" stroke-width="9" fill="none"
              stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round"/>
          </svg>
          <div class="pct"><b id="pct-val">0%</b><span>strength</span></div>
        </div>
      </div>
      <div class="form-side">
        <p>Enter your password to check its strength</p>
        <div class="input-row">
          <input type="password" id="pw" placeholder="Enter your password here..." autocomplete="off"/>
          <span class="face" id="face">🙈</span>
        </div>
        <div class="tags" id="tags"></div>
      </div>
    </div>

    <div class="single-card" style="margin-top:20px;">
      <div class="label">Estimated time to crack</div>
      <div class="value" id="crack-time">—</div>
    </div>

    <div class="review" id="review">Enter a password to see its evaluation.</div>
  </div>

  <div class="card">
    <div class="footer-card">
      <div>
        <div class="label">Generated password</div>
        <div class="pw-out" id="pw-out">—</div>
      </div>
      <button class="copy" id="copy-btn">📋 Copy</button>
    </div>

    <div class="gen-row">
      <span class="label">Length</span>
      <input type="range" id="len-slider" min="8" max="64" value="32" step="1"/>
      <span id="len-val" style="min-width:24px;text-align:right;">32</span>
    </div>

    <div class="checks">
      <label><input type="checkbox" id="chk-upper" checked/> Uppercase letters (A-Z)</label>
      <label><input type="checkbox" id="chk-lower" checked/> Lowercase letters (a-z)</label>
      <label><input type="checkbox" id="chk-num" checked/> Numbers (0-9)</label>
    </div>
    <div class="checks" style="justify-content:center;">
      <label><input type="checkbox" id="chk-sym" checked/> Special characters (!@#$)</label>
    </div>

    <button class="gen-btn" id="gen-btn">🔄 Generate new password</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
